name = "portfolio-chat"
main = "index.js"
compatibility_date = "2026-01-01"

# The origin allowed to call this Worker. Lock this to your live site before
# going public — e.g. "https://ch4ngs4n1ty.github.io". "*" is fine for local dev.
[vars]
ALLOWED_ORIGIN = "*"

# The Claude model the chatbot uses. claude-opus-4-8 is the most capable.
# For a cheaper / faster portfolio Q&A bot, set this to "claude-haiku-4-5".
CLAUDE_MODEL = "claude-haiku-4-5"

# Set the API key as an encrypted secret (NOT here in plaintext):
#   npx wrangler secret put ANTHROPIC_API_KEY
